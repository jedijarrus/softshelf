<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PORTAL_TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #fafafa;
  --bg-card:   #ffffff;
  --bg-soft:   #f4f4f5;
  --bg-hover:  #e4e4e7;
  --border:    #e4e4e7;
  --border-strong: #d4d4d8;
  --fg:        #09090b;
  --fg-2:      #27272a;
  --fg-3:      #52525b;
  --fg-4:      #71717a;
  --fg-5:      #a1a1aa;
  --green:     #16a34a;
  --green-bg:  #f0fdf4;
  --green-bd:  #bbf7d0;
  --red:       #dc2626;
  --red-bg:    #fef2f2;
  --red-bd:    #fecaca;
  --amber:     #d97706;
  --amber-bg:  #fffbeb;
  --amber-bd:  #fde68a;
  --blue:      #2563eb;
  --blue-bg:   #eff6ff;
  --blue-bd:   #bfdbfe;
  --sans:      'Geist', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --mono:      'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --r-sm:      4px;
  --r:         6px;
  --r-lg:      10px;
}

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

.bg-decoration {
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(37,99,235,.04), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(22,163,74,.03), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.shell {
  position: relative; z-index: 1;
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

header.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 48px;
}
.brand { display: flex; align-items: center; gap: 11px; }
.brand-img {
  width: 30px; height: 30px;
  border-radius: var(--r);
  flex-shrink: 0;
  object-fit: contain;
}
.brand-text { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
.brand-text .sub { font-weight: 400; color: var(--fg-4); margin-left: 2px; }

.admin-link {
  font-size: 12px;
  color: var(--fg-4);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: var(--r);
  border: 1px solid transparent;
  transition: all .14s;
}
.admin-link:hover { background: var(--bg-hover); color: var(--fg); border-color: var(--border); }

/* ── Hero ─────────────────────────────────────────────── */
.hero {
  text-align: center;
  margin-bottom: 36px;
}
.hero h1 {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -.025em;
  margin-bottom: 10px;
}
.hero .subtitle {
  color: var(--fg-4);
  font-size: 16px;
  max-width: 580px;
  margin: 0 auto;
}

/* ── Detect Card ──────────────────────────────────────── */
.detect-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: 0 1px 3px rgba(9,9,11,.04), 0 6px 18px rgba(9,9,11,.04);
}

.host-row {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.host-icon {
  width: 44px; height: 44px;
  border-radius: var(--r);
  background: var(--bg-soft);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.host-icon svg { width: 22px; height: 22px; color: var(--fg-3); }
.host-info { flex: 1; min-width: 200px; }
.host-label { font-size: 11px; color: var(--fg-5); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
.host-name {
  font-size: 22px; font-weight: 600;
  font-family: var(--mono);
  letter-spacing: -.01em;
  margin-top: 2px;
}
.host-name.unknown { color: var(--fg-4); font-style: italic; font-family: var(--sans); font-weight: 400; font-size: 18px; }

.host-edit {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 12px;
  font-size: 12px;
  font-family: var(--sans);
  color: var(--fg-3);
  cursor: pointer;
  transition: all .14s;
}
.host-edit:hover { background: var(--bg-hover); border-color: var(--border-strong); color: var(--fg); }

.host-input {
  width: 100%; max-width: 280px;
  font-family: var(--mono);
  font-size: 16px;
  border: 1px solid var(--border-strong);
  border-radius: var(--r);
  padding: 8px 12px;
  background: var(--bg-card);
  color: var(--fg);
}
.host-input:focus { outline: none; border-color: var(--fg); box-shadow: 0 0 0 3px rgba(9,9,11,.05); }

/* ── Status Grid ──────────────────────────────────────── */
.status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-top: 22px;
}
.status-item {
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
}
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--fg-5);
  flex-shrink: 0;
}
.status-dot.ok    { background: var(--green); box-shadow: 0 0 0 4px var(--green-bg); }
.status-dot.err   { background: var(--red);   box-shadow: 0 0 0 4px var(--red-bg); }
.status-dot.warn  { background: var(--amber); box-shadow: 0 0 0 4px var(--amber-bg); }
.status-dot.muted { background: var(--fg-5); }

.status-text { flex: 1; min-width: 0; }
.status-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; color: var(--fg-5); }
.status-value { font-size: 14px; font-weight: 500; color: var(--fg-2); margin-top: 2px; }

/* ── CTA Cards ────────────────────────────────────────── */
.cta-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 32px 28px;
  box-shadow: 0 1px 3px rgba(9,9,11,.04), 0 6px 18px rgba(9,9,11,.04);
}
.cta-card.warn   { border-color: var(--amber-bd); background: linear-gradient(180deg, var(--amber-bg) 0%, var(--bg-card) 60%); }
.cta-card.ok     { border-color: var(--green-bd); background: linear-gradient(180deg, var(--green-bg) 0%, var(--bg-card) 60%); }
.cta-card.err    { border-color: var(--red-bd);   background: linear-gradient(180deg, var(--red-bg)   0%, var(--bg-card) 60%); }
.cta-card.info   { border-color: var(--blue-bd);  background: linear-gradient(180deg, var(--blue-bg)  0%, var(--bg-card) 60%); }

.cta-icon {
  width: 56px; height: 56px;
  border-radius: var(--r-lg);
  background: var(--bg-card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
  box-shadow: 0 1px 2px rgba(9,9,11,.05);
}
.cta-icon svg { width: 30px; height: 30px; }
.cta-card.warn .cta-icon svg { color: var(--amber); }
.cta-card.ok   .cta-icon svg { color: var(--green); }
.cta-card.err  .cta-icon svg { color: var(--red); }
.cta-card.info .cta-icon svg { color: var(--blue); }

.cta-title {
  font-size: 22px; font-weight: 600; letter-spacing: -.015em;
  margin-bottom: 8px;
}
.cta-desc {
  color: var(--fg-3);
  font-size: 14px;
  margin-bottom: 22px;
  max-width: 560px;
}

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--fg);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  padding: 11px 20px;
  border: none;
  border-radius: var(--r);
  cursor: pointer;
  text-decoration: none;
  transition: all .14s;
}
.btn:hover { background: var(--fg-2); transform: translateY(-1px); box-shadow: 0 4px 10px rgba(9,9,11,.15); }
.btn svg { width: 16px; height: 16px; }
.btn.ghost {
  background: transparent;
  color: var(--fg-3);
  border: 1px solid var(--border);
}
.btn.ghost:hover { background: var(--bg-hover); color: var(--fg); border-color: var(--border-strong); box-shadow: none; }

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

/* ── Loading ───────────────────────────────────────── */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--fg);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading {
  display: flex; align-items: center; justify-content: center;
  gap: 12px;
  padding: 60px;
  color: var(--fg-4);
  font-size: 14px;
}

/* ── Packages preview ───────────────────────────────── */
.pkg-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-top: 22px;
}
.pkg-tile {
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  font-size: 13px;
}
.pkg-tile .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--fg-5);
  flex-shrink: 0;
}
.pkg-tile .dot.installed { background: var(--green); }
.pkg-tile .dot.update { background: var(--amber); }
.pkg-tile .name { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pkg-tile .ver { font-family: var(--mono); font-size: 11px; color: var(--fg-5); }

.section-title {
  font-size: 13px; font-weight: 600; color: var(--fg-3);
  text-transform: uppercase; letter-spacing: .05em;
  margin-top: 32px; margin-bottom: 14px;
}

/* ── Footer ───────────────────────────────────────── */
footer.foot {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--fg-5);
  flex-wrap: wrap;
  gap: 12px;
}
footer.foot a { color: var(--fg-4); text-decoration: none; }
footer.foot a:hover { color: var(--fg); }

@media (max-width: 600px) {
  .hero h1 { font-size: 26px; }
  .cta-card { padding: 24px 20px; }
}

kbd {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-soft);
  border: 1px solid var(--border-strong);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 6px;
  color: var(--fg-2);
}

.fade-in { animation: fadeIn .25s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="bg-decoration"></div>

<div class="shell">

<header class="topbar">
  <div class="brand">
    <img src="/api/v1/icon" class="brand-img" alt="" onerror="this.style.display='none'">
    <div class="brand-text">{{PORTAL_TITLE}}</div>
  </div>
  <a href="/admin" class="admin-link">Admin →</a>
</header>

<section class="hero">
  <h1>Software ohne Wartezeit</h1>
  <p class="subtitle">Selbstbedienungs-Portal für freigegebene Anwendungen. Lass uns kurz prüfen, in welchem Zustand dein Rechner ist.</p>
</section>

<div class="detect-card">
  <div class="host-row">
    <div class="host-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="14" rx="2"/>
        <path d="M8 20h8M12 18v2"/>
      </svg>
    </div>
    <div class="host-info">
      <div class="host-label">Dein Computer</div>
      <div class="host-name unknown" id="host-name">erkenne…</div>
    </div>
  </div>

  <div class="status-grid" id="status-grid" style="display:none">
    <div class="status-item">
      <div class="status-dot muted" id="dot-tactical"></div>
      <div class="status-text">
        <div class="status-label">Tactical RMM</div>
        <div class="status-value" id="val-tactical">—</div>
      </div>
    </div>
    <div class="status-item">
      <div class="status-dot muted" id="dot-softshelf"></div>
      <div class="status-text">
        <div class="status-label">Softshelf-Client</div>
        <div class="status-value" id="val-softshelf">—</div>
      </div>
    </div>
  </div>
</div>

<div id="result-area">
  <div class="loading">
    <div class="spinner"></div>
    <span>Lade Status…</span>
  </div>
</div>

<footer class="foot">
  <span>© {{PORTAL_TITLE}}</span>
  <span id="version-tag">·</span>
</footer>

</div>

<script>
let _state = null;

function esc(s) {
  return String(s == null ? '' : s)
    .replaceAll('&','&amp;').replaceAll('<','&lt;')
    .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

async function loadStatus(hostname) {
  const url = '/api/v1/landing-status' + (hostname ? '?hostname=' + encodeURIComponent(hostname) : '');
  try {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' }});
    return await r.json();
  } catch (e) {
    return { ok: false, error: 'network', detail: String(e) };
  }
}

function setDot(id, cls) {
  const el = document.getElementById(id);
  el.className = 'status-dot ' + cls;
}

function setVal(id, txt) {
  document.getElementById(id).textContent = txt;
}

function showHostName(hn, detected_via) {
  const el = document.getElementById('host-name');
  if (hn) {
    el.textContent = hn;
    el.classList.remove('unknown');
    el.title = 'Erkannt via Reverse-DNS';
  } else {
    el.textContent = 'unbekannt';
    el.classList.add('unknown');
  }
}

function showStatusGrid(s) {
  document.getElementById('status-grid').style.display = '';

  if (s.in_tactical) {
    setDot('dot-tactical', 'ok');
    setVal('val-tactical', 'Verwaltet (' + (s.tactical_status || 'online') + ')');
  } else {
    setDot('dot-tactical', 'err');
    setVal('val-tactical', 'Nicht verwaltet');
  }

  if (s.in_softshelf) {
    setDot('dot-softshelf', 'ok');
    setVal('val-softshelf', 'Installiert');
  } else {
    setDot('dot-softshelf', 'warn');
    setVal('val-softshelf', 'Nicht installiert');
  }

}

function renderResult(s) {
  const area = document.getElementById('result-area');
  if (!s.ok || !s.hostname) {
    area.innerHTML = `
      <div class="cta-card info fade-in">
        <div class="cta-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
          </svg>
        </div>
        <div class="cta-title">Rechner nicht erkannt</div>
        <div class="cta-desc">Wir konnten deinen Hostname nicht automatisch ermitteln. Bitte wende dich an die IT-Abteilung wenn du Hilfe benötigst.</div>
        <div class="btn-row">
          <a class="btn" href="mailto:it@consenso.de?subject=Self-Service-Portal%20Hostname%20nicht%20erkannt">IT kontaktieren</a>
        </div>
      </div>`;
    return;
  }

  if (!s.in_tactical) {
    area.innerHTML = `
      <div class="cta-card err fade-in">
        <div class="cta-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="cta-title">Dieser Rechner wird nicht zentral verwaltet</div>
        <div class="cta-desc">
          <strong>${esc(s.hostname)}</strong> ist nicht in unserem RMM-System (Tactical) registriert.
          Bitte wende dich an die IT-Abteilung, damit dein Rechner aufgenommen werden kann.
        </div>
        <div class="btn-row">
          <a class="btn" href="mailto:it@consenso.de?subject=Rechner%20${encodeURIComponent(s.hostname)}%20nicht%20verwaltet">IT kontaktieren</a>
        </div>
      </div>`;
    return;
  }

  if (!s.in_softshelf) {
    area.innerHTML = `
      <div class="cta-card warn fade-in">
        <div class="cta-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
        </div>
        <div class="cta-title">Self-Service-Portal noch nicht installiert</div>
        <div class="cta-desc">
          Dein Rechner <strong>${esc(s.hostname)}</strong> wird verwaltet, aber das Self-Service-Portal läuft noch nicht.
          Klick auf <em>Jetzt installieren</em> — wir starten die Installation automatisch im Hintergrund über die zentrale Verwaltung. Dauert etwa 2 Minuten.
        </div>
        <div class="btn-row" id="install-btn-row">
          <button class="btn" id="install-trigger-btn" onclick="triggerInstall()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Jetzt installieren
          </button>
        </div>
        <div id="install-progress-area" style="display:none; margin-top:20px"></div>
      </div>`;
    return;
  }

  // installed!
  area.innerHTML = `
    <div class="cta-card ok fade-in">
      <div class="cta-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div class="cta-title">Alles bereit</div>
      <div class="cta-desc">
        <strong>${esc(s.hostname)}</strong> ist verbunden. Das Self-Service-Portal läuft im Hintergrund.
        Öffne es per Klick auf das Tray-Icon unten rechts in der Taskleiste (ggf. erst auf den kleinen Pfeil <kbd>^</kbd>).
      </div>
    </div>
  `;
  loadFleetPreview();
}

async function triggerInstall() {
  const btn = document.getElementById('install-trigger-btn');
  const area = document.getElementById('install-progress-area');
  if (!btn || !area) return;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.style.cursor = 'not-allowed';
  area.style.display = 'block';
  area.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--fg-3);font-size:13px"><div class="spinner"></div><span>Installation wird angefordert…</span></div>';

  try {
    const r = await fetch('/api/v1/landing-trigger-install', { method: 'POST' });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      area.innerHTML = `<div style="color:var(--red);font-size:13px;background:var(--red-bg);border:1px solid var(--red-bd);padding:10px 14px;border-radius:var(--r)">Fehler: ${esc(err.detail || r.statusText)}</div>`;
      btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = '';
      return;
    }
    const data = await r.json();
    startInstallCountdown(data.estimated_seconds || 120);
  } catch (e) {
    area.innerHTML = `<div style="color:var(--red);font-size:13px">Netzwerkfehler: ${esc(String(e))}</div>`;
    btn.disabled = false; btn.style.opacity = ''; btn.style.cursor = '';
  }
}

function startInstallCountdown(totalSeconds) {
  const area = document.getElementById('install-progress-area');
  const btnRow = document.getElementById('install-btn-row');
  if (btnRow) btnRow.style.display = 'none';
  if (!area) return;

  area.innerHTML = `
    <div style="background:var(--bg-card);border:1px solid var(--green-bd);border-radius:var(--r-lg);padding:20px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div class="spinner" style="border-top-color:var(--green)"></div>
        <div>
          <div style="font-weight:600;font-size:15px;color:var(--fg)">Installation läuft</div>
          <div style="font-size:12px;color:var(--fg-4)">Tactical RMM führt das Setup als SYSTEM aus.</div>
        </div>
        <div style="margin-left:auto;font-family:var(--mono);font-size:24px;font-weight:600;color:var(--green)" id="countdown">02:00</div>
      </div>
      <div style="height:6px;background:var(--bg-soft);border-radius:3px;overflow:hidden">
        <div id="countdown-bar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--green),#22c55e);transition:width 1s linear"></div>
      </div>
      <div style="margin-top:14px;font-size:12px;color:var(--fg-4)">
        Sobald der Client läuft, wird diese Seite automatisch aktualisiert.
      </div>
    </div>
  `;

  let elapsed = 0;
  const total = totalSeconds;
  const tick = setInterval(async () => {
    elapsed += 1;
    const remain = Math.max(0, total - elapsed);
    const m = Math.floor(remain / 60).toString().padStart(2, '0');
    const sec = (remain % 60).toString().padStart(2, '0');
    const cd = document.getElementById('countdown');
    if (cd) cd.textContent = `${m}:${sec}`;
    const bar = document.getElementById('countdown-bar');
    if (bar) bar.style.width = `${Math.min(100, (elapsed/total)*100)}%`;

    // Recheck status alle 15s ab Sekunde 30
    if (elapsed >= 30 && elapsed % 15 === 0) {
      const s = await loadStatus();
      if (s.ok && s.in_softshelf) {
        clearInterval(tick);
        renderResult(s);
        showStatusGrid(s);
        return;
      }
    }

    if (elapsed >= total) {
      clearInterval(tick);
      // letzter Recheck
      const s = await loadStatus();
      if (s.ok && s.in_softshelf) {
        renderResult(s); showStatusGrid(s); return;
      }
      area.innerHTML = `
        <div style="background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:var(--r-lg);padding:18px">
          <div style="font-weight:600;color:var(--fg);margin-bottom:6px">Installation dauert noch an</div>
          <div style="font-size:13px;color:var(--fg-3)">Lade die Seite gleich neu — der Client meldet sich gerade beim Server an.</div>
          <button class="btn" style="margin-top:12px" onclick="location.reload()">Seite neu laden</button>
        </div>
      `;
    }
  }, 1000);
}

async function loadFleetPreview() {
  // Optional: zeige Beispiel-Pakete aus der Whitelist (read-only)
  // Wenn der Endpoint nicht existiert, einfach ueberspringen
  try {
    const r = await fetch('/api/v1/landing-packages-preview');
    if (!r.ok) return;
    const data = await r.json();
    if (!data.packages || !data.packages.length) return;
    const grid = data.packages.slice(0, 12).map(p => `
      <div class="pkg-tile">
        <div class="dot"></div>
        <div class="name">${esc(p.display_name)}</div>
        <div class="ver">${esc(p.type)}</div>
      </div>`).join('');
    document.getElementById('result-area').insertAdjacentHTML('beforeend', `
      <h3 class="section-title">Verfügbare Software</h3>
      <div class="pkg-grid">${grid}</div>
    `);
  } catch(e) {}
}

(async () => {
  const s = await loadStatus();
  _state = s;
  if (s.ok) {
    showHostName(s.hostname, s.detected_via);
    showStatusGrid(s);
  } else {
    showHostName(null, null);
  }
  renderResult(s);
})();
</script>
