services:
  softshelf-proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    image: softshelf-proxy:latest
    container_name: softshelf-proxy
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      # Pfade konfigurierbar via Env-Vars. Default = relative
      # Repo-Pfade (passt für .38 / klassisches Setup). Bei Dockhand
      # auf /opt/softshelf umstellen via Stack-Env-Vars
      # (SOFTSHELF_DATA_PATH=/opt/softshelf/data, SOFTSHELF_DOWNLOADS_PATH=/opt/softshelf/downloads)
      - ${SOFTSHELF_DATA_PATH:-./data}:/app/data
      - ${SOFTSHELF_DOWNLOADS_PATH:-./downloads}:/app/downloads
    env_file:
      # .env optional: wenn nicht vorhanden, kommen Vars aus Container-
      # Environment (z.B. Dockhand-UI „Environment variables")
      - path: .env
        required: false
    environment:
      # Fallback wenn .env fehlt (Dockhand-UI Env-Vars werden via
      # Compose-Interpolation durchgereicht). Wenn Dockhand selbst die
      # Variable nicht setzt, bleibt der Wert leer und env_file/Defaults
      # greifen.
      SECRET_KEY: ${SECRET_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PORTAL_TITLE: ${ADMIN_PORTAL_TITLE:-}
      TACTICAL_URL: ${TACTICAL_URL:-}
      TACTICAL_API_KEY: ${TACTICAL_API_KEY:-}
      OIDC_TENANT_ID: ${OIDC_TENANT_ID:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
    depends_on:
      - softshelf-builder
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  softshelf-builder:
    build:
      context: .
      dockerfile: builder/Dockerfile
    image: softshelf-builder:latest
    container_name: softshelf-builder
    restart: unless-stopped
    volumes:
      - ${SOFTSHELF_DOWNLOADS_PATH:-./downloads}:/app/downloads
    environment:
      # Shared-Secret fuer die /build-Auth: gleicher Wert wie SECRET_KEY
      # des Proxys (Interpolation aus .env bzw. Stack-Env). Bewusst KEIN
      # env_file hier — der Builder soll die uebrigen Proxy-Secrets
      # (TACTICAL_API_KEY etc.) nicht sehen.
      BUILD_SHARED_SECRET: ${SECRET_KEY:-}
    # Builder ist NICHT nach außen exposed — nur im internen docker-Netz
    expose:
      - "8766"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/health')"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
